<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Model Capture — THE GRAMPS</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.155.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.155.0/examples/jsm/"
    }
  }
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: #0a0a0f;
      color: #f0ece4;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      gap: 40px;
      padding: 40px;
      align-items: flex-start;
    }

    /* Checkerboard = transparent bg indicator */
    #cap-canvas {
      width: 600px;
      height: 600px;
      flex-shrink: 0;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(45deg,#1a1a24 25%,transparent 25%) -10px 0,
        linear-gradient(-45deg,#1a1a24 25%,transparent 25%) -10px 0,
        linear-gradient(45deg,transparent 75%,#1a1a24 75%),
        linear-gradient(-45deg,transparent 75%,#1a1a24 75%);
      background-size: 20px 20px;
      background-color: #111118;
    }

    .panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 300px;
    }

    h1 {
      font-size: .7rem;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: rgba(240,236,228,.35);
      font-weight: 400;
    }

    /* Drop zone */
    .drop-zone {
      border: 1px dashed rgba(196,168,130,.4);
      border-radius: 10px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: background .2s, border-color .2s;
    }
    .drop-zone:hover { background: rgba(196,168,130,.06); border-color: #c4a882; }
    .drop-zone.has-file { border-style: solid; border-color: #c4a882; background: rgba(196,168,130,.08); }

    .drop-icon { font-size: 1.8rem; margin-bottom: 8px; }

    .drop-label {
      font-size: .78rem;
      color: rgba(240,236,228,.45);
      line-height: 1.6;
    }
    .drop-label strong { color: #c4a882; display: block; margin-bottom: 4px; font-size: .85rem; }

    #file-input { display: none; }

    .divider { height: 1px; background: rgba(255,255,255,.07); }

    /* Chips */
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 4px 11px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 50px;
      font-size: .62rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(240,236,228,.3);
      transition: all .2s;
    }
    .chip.active { background:rgba(196,168,130,.2); border-color:#c4a882; color:#f0ece4; }
    .chip.done   { background:rgba(196,168,130,.1); border-color:rgba(196,168,130,.35); color:#c4a882; }

    /* Progress */
    .prog { display:none; flex-direction:column; gap:8px; }
    .prog-bg { height:1px; background:rgba(255,255,255,.08); border-radius:1px; overflow:hidden; }
    .prog-fill { height:100%; background:#c4a882; width:0%; transition:width .4s; }
    .prog-lbl { font-size:.68rem; letter-spacing:.08em; color:rgba(240,236,228,.3); }

    /* Buttons */
    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 50px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, transform .15s, opacity .2s;
    }
    .btn-primary { background:#c4a882; color:#0a0a0f; }
    .btn-primary:hover:not(:disabled) { background:#e8e0d0; transform:translateY(-1px); }
    .btn-primary:disabled { opacity:.3; cursor:not-allowed; transform:none; }

    .done-msg {
      display: none;
      font-size: .8rem;
      line-height: 1.75;
      color: rgba(240,236,228,.5);
    }
    .done-msg strong { color: #c4a882; }
  </style>
</head>
<body>

  <canvas id="cap-canvas" width="1200" height="1200"></canvas>

  <div class="panel">
    <h1>Model Capture · THE GRAMPS</h1>

    <!-- Step 1: file picker -->
    <div class="drop-zone" id="drop-zone">
      <div class="drop-icon">📂</div>
      <div class="drop-label">
        <strong>Selecciona el archivo GLB</strong>
        Haz clic aquí y abre<br>
        <code style="color:#c4a882;font-size:.75rem">ASSETS/GRMP_optimized.glb</code>
      </div>
    </div>
    <input type="file" id="file-input" accept=".glb,.gltf" />

    <div class="divider"></div>

    <div class="chips" id="chips"></div>

    <div class="prog" id="prog">
      <div class="prog-bg"><div class="prog-fill" id="prog-fill"></div></div>
      <p class="prog-lbl" id="prog-lbl">…</p>
    </div>

    <button class="btn btn-primary" id="btn-start" disabled>
      Selecciona el GLB primero
    </button>

    <p class="done-msg" id="done-msg">
      ✓ <strong>Capturas listas.</strong><br>
      Mueve los PNG descargados a la carpeta <strong>IMG/</strong> y recarga <strong>product.html</strong>.
    </p>
  </div>

<script type="module">
import * as THREE     from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

const canvas   = document.getElementById('cap-canvas');
const dropZone = document.getElementById('drop-zone');
const fileInput= document.getElementById('file-input');
const btnStart = document.getElementById('btn-start');
const progEl   = document.getElementById('prog');
const progFill = document.getElementById('prog-fill');
const progLbl  = document.getElementById('prog-lbl');
const doneMsg  = document.getElementById('done-msg');
const chipsEl  = document.getElementById('chips');

const ANGLES = [
  { name:'grmp_34_front', label:'¾ Front',  az:40,  el:68  },
  { name:'grmp_front',    label:'Front',     az:0,   el:82  },
  { name:'grmp_left',     label:'Left',      az:90,  el:82  },
  { name:'grmp_back',     label:'Back',      az:180, el:82  },
  { name:'grmp_right',    label:'Right',     az:270, el:82  },
  { name:'grmp_34_back',  label:'¾ Back',    az:220, el:68  },
  { name:'grmp_low',      label:'Low',       az:30,  el:108 },
];

ANGLES.forEach((a, i) => {
  const c = document.createElement('span');
  c.className = 'chip'; c.id = `chip-${i}`; c.textContent = a.label;
  chipsEl.appendChild(c);
});

/* ── Three.js renderer ── */
const renderer = new THREE.WebGLRenderer({
  canvas, antialias: true, alpha: true, preserveDrawingBuffer: true
});
renderer.setSize(1200, 1200, false);
renderer.setPixelRatio(1);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x000000, 0);

const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(32, 1, 0.1, 100);

/* Lighting */
scene.add(new THREE.AmbientLight(0xffffff, 1.4));
const key  = new THREE.DirectionalLight(0xffffff, 2.2);
key.position.set(4, 8, 6);  scene.add(key);
const fill = new THREE.DirectionalLight(0xd0e8ff, 0.8);
fill.position.set(-6, 2, -4); scene.add(fill);
const rim  = new THREE.DirectionalLight(0xffe0a0, 0.5);
rim.position.set(0, -4, -6);  scene.add(rim);

let camRadius = 6; // default, overwritten after model loads

function setCam(azDeg, elDeg, r) {
  r = r ?? camRadius;
  const az = azDeg * Math.PI / 180;
  const el = elDeg * Math.PI / 180;
  camera.position.set(
    r * Math.sin(el) * Math.sin(az),
    r * Math.cos(el),
    r * Math.sin(el) * Math.cos(az)
  );
  camera.lookAt(0, 0, 0);
}

/* ── File loading ── */
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => loadFile(e.target.files[0]));

function loadFile(file) {
  if (!file) return;
  dropZone.classList.add('has-file');
  dropZone.querySelector('.drop-label').innerHTML =
    `<strong>${file.name}</strong>Cargando…`;

  const url    = URL.createObjectURL(file);
  const loader = new GLTFLoader();

  loader.load(url, gltf => {
    URL.revokeObjectURL(url);

    const model = gltf.scene;

    model.traverse(node => {
      if (!node.isMesh) return;
      const mats = Array.isArray(node.material) ? node.material : [node.material];
      mats.forEach(m => { m.vertexColors = true; m.needsUpdate = true; });
    });

    const box    = new THREE.Box3().setFromObject(model);
    const size   = box.getSize(new THREE.Vector3());
    const scale  = 2.8 / Math.max(size.x, size.y, size.z);
    model.scale.setScalar(scale);
    const center = box.getCenter(new THREE.Vector3());
    model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
    scene.add(model);

    /* Auto-fit camera distance: largest dimension / tan(halfFOV), with 1.35× margin */
    const scaledMax = Math.max(size.x, size.y, size.z) * scale;
    const halfFov   = (camera.fov / 2) * Math.PI / 180;
    camRadius = (scaledMax / 2 / Math.tan(halfFov)) * 1.35;

    /* Preview */
    setCam(40, 68);
    renderer.render(scene, camera);

    dropZone.querySelector('.drop-label').innerHTML =
      `<strong style="color:#c4a882">✓ ${file.name}</strong>Modelo listo.`;

    btnStart.textContent = 'Capturar 7 ángulos →';
    btnStart.disabled    = false;

    btnStart.addEventListener('click', async () => {
      btnStart.disabled = true;
      progEl.style.display = 'flex';

      for (let i = 0; i < ANGLES.length; i++) {
        const a    = ANGLES[i];
        const chip = document.getElementById(`chip-${i}`);
        chip.classList.add('active');
        progLbl.textContent  = `${a.label} (${i+1}/${ANGLES.length})…`;
        progFill.style.width = `${(i / ANGLES.length) * 100}%`;

        setCam(a.az, a.el);
        renderer.render(scene, camera);
        await new Promise(r => requestAnimationFrame(r));

        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        dlBlob(blob, a.name + '.png');
        await new Promise(r => setTimeout(r, 400));

        chip.classList.remove('active');
        chip.classList.add('done');
      }

      progFill.style.width = '100%';
      progLbl.textContent  = '✓ Completado';
      doneMsg.style.display  = 'block';
      btnStart.textContent   = '↺ Capturar de nuevo';
      btnStart.disabled      = false;
    });

  }, undefined, err => {
    dropZone.querySelector('.drop-label').innerHTML =
      `<strong style="color:#e88">Error</strong>${err.message}`;
    console.error(err);
  });
}

function dlBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}
</script>
</body>
</html>
